<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>微信扫码收听</title>
<style>
  :root {
    --bg-1: #0d2238;
    --bg-2: #132b45;
    --panel-line: rgba(255, 255, 255, 0.16);
    --panel-fill: rgba(14, 33, 54, 0.9);
    --soft: rgba(255, 255, 255, 0.72);
    --text: #f8fbff;
    --track: rgba(255, 255, 255, 0.32);
    --button: rgba(53, 73, 99, 0.92);
    --button-line: rgba(255, 255, 255, 0.12);
    --mint: #85e1d6;
    --mint-2: #eef7ef;
    --gold: #f0d786;
    --record-line: rgba(255, 255, 255, 0.34);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 88% 8%, rgba(132, 229, 220, 0.42), rgba(132, 229, 220, 0.08) 18%, transparent 31%),
      radial-gradient(circle at 8% 96%, rgba(214, 167, 90, 0.3), rgba(214, 167, 90, 0.06) 16%, transparent 28%),
      linear-gradient(145deg, var(--bg-1), var(--bg-2));
  }

  body {
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
  }

  .phone-shell {
    width: min(100%, 820px);
    margin: 0 auto;
    min-height: calc(100vh - 20px - env(safe-area-inset-bottom));
    border-radius: 32px;
    border: 1px solid var(--panel-line);
    background:
      linear-gradient(180deg, rgba(12, 30, 50, 0.96), rgba(19, 41, 66, 0.98));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    position: relative;
    overflow: hidden;
  }

  .phone-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 90% 7%, rgba(132, 229, 220, 0.28), transparent 18%),
      radial-gradient(circle at 7% 96%, rgba(214, 167, 90, 0.22), transparent 16%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    min-height: calc(100vh - 20px - env(safe-area-inset-bottom));
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .theme-badge,
  .status-text {
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(57, 76, 100, 0.62);
    color: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
  }

  .theme-badge {
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 700;
  }

  .status-text {
    padding: 8px 0;
    font-size: 13px;
    font-weight: 600;
    background: transparent;
    border: 0;
  }

  .hero {
    display: grid;
    place-items: center;
    padding: 10px 0 4px;
  }

  .record {
    width: min(100%, clamp(180px, 31vh, 300px));
    aspect-ratio: 1;
    border-radius: 50%;
    position: relative;
    display: grid;
    place-items: center;
    background:
      repeating-radial-gradient(circle at center,
        transparent 0 53px,
        var(--record-line) 53px 57px,
        transparent 57px 73px,
        var(--record-line) 73px 77px,
        transparent 77px 93px,
        var(--record-line) 93px 97px,
        transparent 97px 113px,
        var(--record-line) 113px 117px,
        transparent 117px 133px,
        var(--record-line) 133px 137px,
        transparent 137px 153px,
        var(--record-line) 153px 157px,
        transparent 157px 173px,
        var(--record-line) 173px 177px,
        transparent 177px 193px,
        var(--record-line) 193px 197px,
        transparent 197px 213px),
      radial-gradient(circle at center, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    box-shadow: inset 0 0 0 10px rgba(255, 255, 255, 0.06);
    animation: spin 16s linear infinite;
    animation-play-state: paused;
  }

  .record.playing {
    animation-play-state: running;
  }

  .record::before,
  .record::after {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    filter: blur(0.4px);
  }

  .record::before {
    top: 6px;
    left: calc(50% - 12px);
  }

  .record::after {
    bottom: 6px;
    left: calc(50% - 12px);
  }

  .record-core {
    width: clamp(88px, 14vh, 122px);
    aspect-ratio: 1;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #94e0d3, var(--gold));
    box-shadow:
      inset 0 2px 14px rgba(255, 255, 255, 0.32),
      0 12px 36px rgba(0, 0, 0, 0.2);
    font-size: clamp(42px, 6vh, 54px);
  }

  .text-block {
    padding: 2px 8px 0;
  }

  .title {
    margin: 0;
    font-size: clamp(25px, 6vw, 40px);
    line-height: 1.08;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .subtitle {
    margin: 12px 0 0;
    color: rgba(255, 255, 255, 0.78);
    font-size: clamp(15px, 3.6vw, 21px);
    line-height: 1.45;
    letter-spacing: 0.01em;
  }

  .subtitle-line + .subtitle-line {
    margin-top: 6px;
  }

  .progress-wrap {
    padding: 14px 8px 0;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.78);
    font-size: clamp(16px, 4.5vw, 24px);
    margin-bottom: 12px;
  }

  .seek-bar {
    width: 100%;
    appearance: none;
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--mint) 0 var(--progress, 0%), rgba(255, 255, 255, 0.28) var(--progress, 0%) 100%);
    border: 1px solid rgba(255, 255, 255, 0.14);
    outline: none;
  }

  .seek-bar::-webkit-slider-thumb {
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #74d6cb;
    border: 0;
    box-shadow: 0 4px 16px rgba(116, 214, 203, 0.35);
  }

  .seek-bar::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #74d6cb;
    border: 0;
    box-shadow: 0 4px 16px rgba(116, 214, 203, 0.35);
  }

  .seek-bar::-moz-range-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.28);
  }

  .controls {
    padding: 14px 8px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .secondary-actions {
    padding: 12px 8px 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  button,
  .link-btn {
    border: 1px solid var(--button-line);
    background: var(--button);
    color: var(--text);
    border-radius: 999px;
    font: inherit;
    font-weight: 800;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    min-height: 58px;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .jump-btn {
    min-width: 88px;
    font-size: clamp(18px, 4.8vw, 28px);
  }

  .play-btn {
    min-width: 136px;
    color: #0a1220;
    background: linear-gradient(90deg, var(--mint), var(--mint-2));
    border: 0;
  }

  .action-btn,
  .link-btn {
    width: 100%;
    font-size: clamp(16px, 4vw, 24px);
  }

  audio {
    display: none;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (max-width: 520px) {
    .phone-shell {
      min-height: calc(100vh - 12px - env(safe-area-inset-bottom));
      border-radius: 26px;
    }

    .content {
      min-height: calc(100vh - 12px - env(safe-area-inset-bottom));
      padding: 12px 12px 14px;
    }

    .theme-badge {
      padding: 10px 14px;
      font-size: 14px;
    }

    .status-text {
      font-size: 12px;
    }

    .record {
      width: min(100%, 230px);
    }

    .record-core {
      width: 92px;
      font-size: 40px;
    }

    .controls {
      gap: 10px;
    }

    .jump-btn {
      min-width: 78px;
    }

    .play-btn {
      min-width: 118px;
    }

    .secondary-actions {
      gap: 10px;
    }

    button,
    .link-btn {
      min-height: 54px;
      padding: 0 14px;
    }
  }

  @media (max-height: 760px) {
    .content {
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .hero {
      padding-top: 6px;
    }

    .record {
      width: min(100%, 200px);
    }

    .title {
      font-size: clamp(22px, 5.8vw, 30px);
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.38;
    }

    .progress-wrap,
    .controls,
    .secondary-actions {
      padding-top: 10px;
    }
  }
</style>
</head>
<body>
  <main class="phone-shell">
    <div class="content">
      <div class="topbar">
        <div class="theme-badge" id="themeBadge">空灵氛围</div>
        <div class="status-text" id="statusText">请点击后播放</div>
      </div>

      <section class="hero">
        <div class="record" id="record">
          <div class="record-core" id="recordIcon">♪</div>
        </div>
      </section>

      <section class="text-block">
        <h1 class="title" id="title">微信扫码收听</h1>
        <div class="subtitle" id="subtitle">打开即可播放，适合分享课程、朗读、播客或品牌语音内容。</div>
      </section>

      <section class="progress-wrap">
        <div class="time-row">
          <span id="currentTime">00:00</span>
          <span id="duration">00:00</span>
        </div>
        <input id="seekBar" class="seek-bar" type="range" min="0" max="100" value="0">
      </section>

      <section class="controls">
        <button id="rewindBtn" class="jump-btn" type="button">-10s</button>
        <button id="playBtn" class="play-btn jump-btn" type="button">播放</button>
        <button id="forwardBtn" class="jump-btn" type="button">+10s</button>
      </section>

      <section class="secondary-actions">
        <button id="speedBtn" class="action-btn" type="button">1.0x</button>
        <a id="downloadBtn" class="link-btn" href="#" download>下载音频</a>
      </section>
    </div>

    <audio id="audio" preload="auto" playsinline webkit-playsinline></audio>
  </main>

<script>
  const params = new URLSearchParams(window.location.search);
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const forwardBtn = document.getElementById('forwardBtn');
  const speedBtn = document.getElementById('speedBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const seekBar = document.getElementById('seekBar');
  const currentTime = document.getElementById('currentTime');
  const duration = document.getElementById('duration');
  const statusText = document.getElementById('statusText');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const themeBadge = document.getElementById('themeBadge');
  const record = document.getElementById('record');
  const recordIcon = document.getElementById('recordIcon');

  const themes = {
    aurora: {
      label: '空灵氛围',
      icon: '♪',
      vars: {
        bg1: '#173d89', bg2: '#245fb8', mint: '#63cde8', mint2: '#edf8fd', gold: '#eacb73'
      }
    },
    podcast: {
      label: '播客对谈',
      icon: '🎙',
      vars: {
        bg1: '#91315f', bg2: '#c45b58', mint: '#f0a8b8', mint2: '#fff3f7', gold: '#e7c37a'
      }
    },
    story: {
      label: '故事朗读',
      icon: '📚',
      vars: {
        bg1: '#7d4a34', bg2: '#b7733d', mint: '#f2cf99', mint2: '#fff8f1', gold: '#f0dd9a'
      }
    },
    memo: {
      label: '语音备忘',
      icon: '✦',
      vars: {
        bg1: '#1d7f63', bg2: '#3fa187', mint: '#8ed8bf', mint2: '#f0fbf6', gold: '#e8d08e'
      }
    },
    radio: {
      label: '电台时刻',
      icon: '◉',
      vars: {
        bg1: '#56339a', bg2: '#8f4ca8', mint: '#e2a8d8', mint2: '#faf2fc', gold: '#e8c56e'
      }
    },
    luxe: {
      label: '金色奢感',
      icon: '♬',
      vars: {
        bg1: '#9a5a1f', bg2: '#c99643', mint: '#efcf90', mint2: '#fff8ed', gold: '#f0dc95'
      }
    },
    forest: {
      label: '自然清听',
      icon: '♩',
      vars: {
        bg1: '#2d5f41', bg2: '#5f8c52', mint: '#c2dda8', mint2: '#f7fbf0', gold: '#e3d78d'
      }
    }
  };

  function applyTheme(themeKey) {
    const theme = themes[themeKey] || themes.aurora;
    document.documentElement.style.setProperty('--bg-1', theme.vars.bg1);
    document.documentElement.style.setProperty('--bg-2', theme.vars.bg2);
    document.documentElement.style.setProperty('--mint', theme.vars.mint);
    document.documentElement.style.setProperty('--mint-2', theme.vars.mint2);
    document.documentElement.style.setProperty('--gold', theme.vars.gold);
    themeBadge.textContent = theme.label;
    recordIcon.textContent = theme.icon;
  }

  function formatTime(value) {
    if (!Number.isFinite(value)) return '00:00';
    const minutes = Math.floor(value / 60).toString().padStart(2, '0');
    const seconds = Math.floor(value % 60).toString().padStart(2, '0');
    return minutes + ':' + seconds;
  }

  const durationCacheKeyPrefix = 'audio-qrcode-duration:';
  let knownDurationSeconds = null;
  let downloadInProgress = false;
  let downloadStatusTimer = null;
  let downloadAbortController = null;
  let downloadPreviousStatus = '';
  let hasStartedPlayback = false;

  function normalizeAudioUrl(url) {
    try {
      return new URL(url, window.location.href).href;
    } catch (error) {
      return url;
    }
  }

  function getDurationStorageKey(url) {
    return durationCacheKeyPrefix + normalizeAudioUrl(url);
  }

  function readCachedDuration(url) {
    try {
      const value = window.localStorage.getItem(getDurationStorageKey(url));
      const seconds = Number(value);
      return Number.isFinite(seconds) && seconds > 0 ? seconds : null;
    } catch (error) {
      return null;
    }
  }

  function writeCachedDuration(url, seconds) {
    if (!Number.isFinite(seconds) || seconds <= 0) {
      return;
    }

    try {
      window.localStorage.setItem(getDurationStorageKey(url), String(seconds));
    } catch (error) {
    }
  }

  function getBundledDurationHint(url) {
    const defaultAudioUrl = normalizeAudioUrl(resolveDefaultAudioUrl());

    if (normalizeAudioUrl(url) === defaultAudioUrl) {
      return 310.590667;
    }

    return null;
  }

  function primeDurationDisplay(url) {
    knownDurationSeconds = readCachedDuration(url) || getBundledDurationHint(url);
    duration.textContent = formatTime(knownDurationSeconds);
  }

  function updateProgress() {
    const effectiveDuration = Number.isFinite(audio.duration) && audio.duration > 0
      ? audio.duration
      : knownDurationSeconds;

    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      knownDurationSeconds = audio.duration;
      writeCachedDuration(activeAudioUrl, audio.duration);
    }

    currentTime.textContent = formatTime(audio.currentTime);
    duration.textContent = formatTime(effectiveDuration);
    const percent = effectiveDuration ? (audio.currentTime / effectiveDuration) * 100 : 0;
    seekBar.value = percent;
    seekBar.style.setProperty('--progress', percent + '%');
  }

  function setPlayingState(playing) {
    playBtn.textContent = playing ? '暂停' : '播放';
    statusText.textContent = playing ? '正在播放' : '请点击后播放';
    record.classList.toggle('playing', playing);
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function splitSubtitleSegments(text) {
    return text
      .replace(/\r\n?/g, '\n')
      .split('\n')
      .flatMap(line => line.split(/\s*-\s*/))
      .map(item => item.trim())
      .filter(Boolean);
  }

  function renderSubtitle(text) {
    const lines = splitSubtitleSegments(text.trim());
    const hasListMarkers = lines.length > 1;

    if (!lines.length) {
      subtitle.textContent = '';
      return;
    }

    subtitle.innerHTML = lines
      .map(item => '<div class="subtitle-line">' + (hasListMarkers ? '- ' : '') + escapeHtml(item) + '</div>')
      .join('');
  }

  function buildDownloadName(url, fallbackName) {
    try {
      const pathname = new URL(url, window.location.href).pathname;
      const fileName = pathname.split('/').pop();
      return fileName || fallbackName;
    } catch (error) {
      return fallbackName;
    }
  }

  function resolveDefaultAudioUrl() {
    return new URL('./audio.m4a', window.location.href).href;
  }

  function parseJsdelivrAudioUrl(url) {
    try {
      const parsedUrl = new URL(url, window.location.href);
      const match = parsedUrl.pathname.match(/^\/gh\/([^/]+)\/([^@/]+)@([^/]+)\/(.+)$/);

      if (parsedUrl.hostname !== 'cdn.jsdelivr.net' || !match) {
        return null;
      }

      return {
        owner: decodeURIComponent(match[1]),
        repo: decodeURIComponent(match[2]),
        branch: decodeURIComponent(match[3]),
        path: match[4].split('/').map(segment => decodeURIComponent(segment)).join('/')
      };
    } catch (error) {
      return null;
    }
  }

  function buildFallbackAudioUrl(url) {
    const parsedAudio = parseJsdelivrAudioUrl(url);

    if (!parsedAudio) {
      return null;
    }

    return new URL(parsedAudio.path, window.location.href).href;
  }

  function syncAudioLinks(url) {
    audio.pause();
    primeDurationDisplay(url);
    audio.src = url;
    audio.load();
    downloadBtn.href = url;
    downloadBtn.download = buildDownloadName(url, 'audio.m4a');
  }

  function triggerFileDownload(url, fileName) {
    const tempLink = document.createElement('a');
    tempLink.href = url;
    tempLink.download = fileName;
    tempLink.rel = 'noopener';
    tempLink.style.display = 'none';
    document.body.appendChild(tempLink);
    tempLink.click();
    tempLink.remove();
  }

  function setDownloadButtonState(isDownloading) {
    downloadBtn.textContent = isDownloading ? '暂停下载' : '下载音频';
  }

  function stopDownloadStatusAnimation() {
    if (downloadStatusTimer) {
      window.clearInterval(downloadStatusTimer);
      downloadStatusTimer = null;
    }
  }

  function startDownloadStatusAnimation() {
    stopDownloadStatusAnimation();

    let frame = 0;

    function render() {
      const dots = '…'.repeat((frame % 3) + 1);
      statusText.textContent = '正在下载中' + dots;
      frame += 1;
    }

    render();
    downloadStatusTimer = window.setInterval(render, 420);
  }

  function restoreDownloadStatus(message) {
    statusText.textContent = message;

    window.setTimeout(() => {
      if (
        statusText.textContent === '已开始下载' ||
        statusText.textContent === '已打开音频链接' ||
        statusText.textContent === '已暂停下载'
      ) {
        statusText.textContent = audio.paused ? downloadPreviousStatus : '正在播放';
      }
    }, 1600);
  }

  function cancelDownload() {
    if (!downloadInProgress) {
      return;
    }

    downloadInProgress = false;
    stopDownloadStatusAnimation();

    if (downloadAbortController) {
      downloadAbortController.abort();
      downloadAbortController = null;
    }

    setDownloadButtonState(false);
    restoreDownloadStatus('已暂停下载');
  }

  async function handleDownload() {
    if (downloadInProgress) {
      cancelDownload();
      return;
    }

    const controller = new AbortController();
    downloadInProgress = true;
    downloadAbortController = controller;
    const fileName = buildDownloadName(activeAudioUrl, 'audio.m4a');
    downloadPreviousStatus = statusText.textContent;
    setDownloadButtonState(true);
    startDownloadStatusAnimation();

    try {
      const response = await fetch(activeAudioUrl, { cache: 'no-store', signal: controller.signal });

      if (!response.ok) {
        throw new Error('download request failed');
      }

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      try {
        triggerFileDownload(objectUrl, fileName);
      } finally {
        window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
      }

      restoreDownloadStatus('已开始下载');
    } catch (error) {
      if (controller.signal.aborted) {
        return;
      }

      triggerFileDownload(activeAudioUrl, fileName);
      restoreDownloadStatus('已打开音频链接');
    } finally {
      stopDownloadStatusAnimation();

      if (downloadAbortController === controller) {
        downloadAbortController = null;
      }

      if (controller.signal.aborted) {
        return;
      }

      downloadInProgress = false;
      setDownloadButtonState(false);
    }
  }

  function setDurationDisplay(seconds) {
    if (!Number.isFinite(seconds) || seconds <= 0) {
      return;
    }

    knownDurationSeconds = seconds;
    writeCachedDuration(activeAudioUrl, seconds);
    duration.textContent = formatTime(seconds);
  }

  let durationRequestId = 0;

  async function preloadDuration(url) {
    const requestId = ++durationRequestId;
    const defaultAudioUrl = normalizeAudioUrl(resolveDefaultAudioUrl());
    const normalizedUrl = normalizeAudioUrl(url);

    function updateIfCurrent(seconds) {
      if (requestId !== durationRequestId) {
        return;
      }

      setDurationDisplay(seconds);
    }

    const hintedDuration = readCachedDuration(url) || getBundledDurationHint(url);

    if (hintedDuration) {
      updateIfCurrent(hintedDuration);

      if (normalizedUrl === defaultAudioUrl) {
        return;
      }
    }

    if (Number.isFinite(audio.duration) && audio.duration > 0) {
      updateIfCurrent(audio.duration);
      return;
    }

    if (playRequested || !audio.paused) {
      return;
    }

    try {
      const probe = new Audio();
      probe.preload = 'metadata';
      probe.src = url;

      const metadataDuration = await new Promise((resolve, reject) => {
        const timeoutId = window.setTimeout(() => reject(new Error('metadata timeout')), 2000);

        function cleanup() {
          window.clearTimeout(timeoutId);
          probe.removeEventListener('loadedmetadata', onLoadedMetadata);
          probe.removeEventListener('durationchange', onDurationChange);
          probe.removeEventListener('error', onError);
        }

        function finish(value) {
          cleanup();
          resolve(value);
        }

        function onLoadedMetadata() {
          finish(probe.duration);
        }

        function onDurationChange() {
          if (Number.isFinite(probe.duration) && probe.duration > 0) {
            finish(probe.duration);
          }
        }

        function onError() {
          cleanup();
          reject(new Error('metadata error'));
        }

        probe.addEventListener('loadedmetadata', onLoadedMetadata);
        probe.addEventListener('durationchange', onDurationChange);
        probe.addEventListener('error', onError);
        probe.load();
      });

      updateIfCurrent(metadataDuration);
      return;
    } catch (error) {
    }

    try {
      if (playRequested || !audio.paused) {
        return;
      }

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) {
        return;
      }

      const response = await fetch(url, { cache: 'force-cache' });

      if (!response.ok) {
        return;
      }

      const buffer = await response.arrayBuffer();
      const audioContext = new AudioContextClass();

      try {
        const decodedBuffer = await audioContext.decodeAudioData(buffer.slice(0));
        updateIfCurrent(decodedBuffer.duration);
      } finally {
        if (typeof audioContext.close === 'function') {
          audioContext.close().catch(() => {});
        }
      }
    } catch (error) {
    }
  }

  const titleText = params.get('title') || '班级小故事';
  const subtitleText = params.get('subtitle') || '欢迎来到班级小故事, 扫码即可收听班级里的温暖片段与成长声音。';
  const themeKey = params.get('theme') || 'aurora';
  let activeAudioUrl = params.get('audio') || resolveDefaultAudioUrl();
  let fallbackAudioUrl = buildFallbackAudioUrl(activeAudioUrl);
  let playRequested = false;

  audio.addEventListener('loadedmetadata', updateProgress);
  audio.addEventListener('durationchange', updateProgress);
  audio.addEventListener('timeupdate', updateProgress);
  audio.addEventListener('pause', () => setPlayingState(false));
  audio.addEventListener('play', () => setPlayingState(true));
  audio.addEventListener('playing', () => {
    hasStartedPlayback = true;
  });
  audio.addEventListener('ended', () => {
    playRequested = false;
    setPlayingState(false);
    statusText.textContent = '播放完成';
  });
  audio.addEventListener('error', () => {
    if (fallbackAudioUrl && activeAudioUrl !== fallbackAudioUrl) {
      activeAudioUrl = fallbackAudioUrl;
      fallbackAudioUrl = null;
      syncAudioLinks(activeAudioUrl);
      statusText.textContent = '正在切换备用音频...';
      preloadDuration(activeAudioUrl);
      audio.load();
      return;
    }

    playRequested = false;
    setPlayingState(false);
    statusText.textContent = '音频加载失败';
  });

  applyTheme(themeKey);
  title.textContent = titleText;
  renderSubtitle(subtitleText);
  document.title = titleText + ' - 微信扫码收听';
  syncAudioLinks(activeAudioUrl);
  updateProgress();
  preloadDuration(activeAudioUrl);

  playBtn.addEventListener('click', async () => {
    if (audio.paused) {
      playRequested = true;
      statusText.textContent = '正在加载音频...';

      if (!hasStartedPlayback && audio.currentTime > 0.2 && audio.currentTime < 5) {
        audio.currentTime = 0;
      }

      try {
        await audio.play();
        setPlayingState(true);
      } catch (error) {
        statusText.textContent = '请点击后播放';
      }
    } else {
      playRequested = false;
      audio.pause();
      setPlayingState(false);
    }
  });

  rewindBtn.addEventListener('click', () => {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });

  forwardBtn.addEventListener('click', () => {
    audio.currentTime = Math.min(audio.duration || audio.currentTime + 10, audio.currentTime + 10);
  });

  speedBtn.addEventListener('click', () => {
    const speeds = [1, 1.25, 1.5, 2, 0.75];
    const currentIndex = speeds.indexOf(audio.playbackRate);
    const nextSpeed = speeds[(currentIndex + 1) % speeds.length];
    audio.playbackRate = nextSpeed;
    speedBtn.textContent = nextSpeed.toFixed(2).replace(/\.00$/, '.0') + 'x';
  });

  downloadBtn.addEventListener('click', async event => {
    event.preventDefault();
    await handleDownload();
  });

  seekBar.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (Number(seekBar.value) / 100) * audio.duration;
  });

</script>
</body>
</html>
