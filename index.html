<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>微信扫码收听</title>
<style>
  :root {
    --bg-1: #0d2238;
    --bg-2: #132b45;
    --panel-line: rgba(255, 255, 255, 0.16);
    --panel-fill: rgba(14, 33, 54, 0.9);
    --soft: rgba(255, 255, 255, 0.72);
    --text: #f8fbff;
    --track: rgba(255, 255, 255, 0.32);
    --button: rgba(53, 73, 99, 0.92);
    --button-line: rgba(255, 255, 255, 0.12);
    --mint: #85e1d6;
    --mint-2: #eef7ef;
    --gold: #f0d786;
    --record-line: rgba(255, 255, 255, 0.34);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 88% 8%, rgba(132, 229, 220, 0.42), rgba(132, 229, 220, 0.08) 18%, transparent 31%),
      radial-gradient(circle at 8% 96%, rgba(214, 167, 90, 0.3), rgba(214, 167, 90, 0.06) 16%, transparent 28%),
      linear-gradient(145deg, var(--bg-1), var(--bg-2));
  }

  body {
    padding: 22px 12px calc(22px + env(safe-area-inset-bottom));
  }

  .phone-shell {
    width: min(100%, 820px);
    margin: 0 auto;
    min-height: calc(100vh - 44px);
    border-radius: 38px;
    border: 1px solid var(--panel-line);
    background:
      linear-gradient(180deg, rgba(12, 30, 50, 0.96), rgba(19, 41, 66, 0.98));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    position: relative;
    overflow: hidden;
  }

  .phone-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 90% 7%, rgba(132, 229, 220, 0.28), transparent 18%),
      radial-gradient(circle at 7% 96%, rgba(214, 167, 90, 0.22), transparent 16%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 24px 22px 12px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .theme-badge,
  .status-text {
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(57, 76, 100, 0.62);
    color: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
  }

  .theme-badge {
    padding: 18px 26px;
    font-size: 18px;
    font-weight: 700;
  }

  .status-text {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    background: transparent;
    border: 0;
  }

  .hero {
    display: grid;
    place-items: center;
    padding: 30px 0 18px;
  }

  .record {
    width: min(100%, 440px);
    aspect-ratio: 1;
    border-radius: 50%;
    position: relative;
    display: grid;
    place-items: center;
    background:
      repeating-radial-gradient(circle at center,
        transparent 0 53px,
        var(--record-line) 53px 57px,
        transparent 57px 73px,
        var(--record-line) 73px 77px,
        transparent 77px 93px,
        var(--record-line) 93px 97px,
        transparent 97px 113px,
        var(--record-line) 113px 117px,
        transparent 117px 133px,
        var(--record-line) 133px 137px,
        transparent 137px 153px,
        var(--record-line) 153px 157px,
        transparent 157px 173px,
        var(--record-line) 173px 177px,
        transparent 177px 193px,
        var(--record-line) 193px 197px,
        transparent 197px 213px),
      radial-gradient(circle at center, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    box-shadow: inset 0 0 0 10px rgba(255, 255, 255, 0.06);
    animation: spin 16s linear infinite;
    animation-play-state: paused;
  }

  .record.playing {
    animation-play-state: running;
  }

  .record::before,
  .record::after {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.22);
    filter: blur(0.4px);
  }

  .record::before {
    top: 6px;
    left: calc(50% - 12px);
  }

  .record::after {
    bottom: 6px;
    left: calc(50% - 12px);
  }

  .record-core {
    width: 154px;
    aspect-ratio: 1;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #94e0d3, var(--gold));
    box-shadow:
      inset 0 2px 14px rgba(255, 255, 255, 0.32),
      0 12px 36px rgba(0, 0, 0, 0.2);
    font-size: 64px;
  }

  .text-block {
    padding: 8px 26px 0;
  }

  .title {
    margin: 0;
    font-size: clamp(28px, 8vw, 54px);
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .subtitle {
    margin: 18px 0 0;
    color: rgba(255, 255, 255, 0.78);
    font-size: clamp(17px, 4.8vw, 28px);
    line-height: 1.55;
    letter-spacing: 0.01em;
  }

  .progress-wrap {
    padding: 34px 26px 0;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.78);
    font-size: clamp(18px, 5vw, 30px);
    margin-bottom: 18px;
  }

  .seek-bar {
    width: 100%;
    appearance: none;
    height: 18px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--mint) 0 var(--progress, 0%), rgba(255, 255, 255, 0.28) var(--progress, 0%) 100%);
    border: 1px solid rgba(255, 255, 255, 0.14);
    outline: none;
  }

  .seek-bar::-webkit-slider-thumb {
    appearance: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #74d6cb;
    border: 0;
    box-shadow: 0 4px 16px rgba(116, 214, 203, 0.35);
  }

  .seek-bar::-moz-range-thumb {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #74d6cb;
    border: 0;
    box-shadow: 0 4px 16px rgba(116, 214, 203, 0.35);
  }

  .seek-bar::-moz-range-track {
    height: 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.28);
  }

  .controls {
    padding: 34px 26px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
  }

  .secondary-actions {
    padding: 22px 26px 0;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  button,
  .link-btn {
    border: 1px solid var(--button-line);
    background: var(--button);
    color: var(--text);
    border-radius: 999px;
    font: inherit;
    font-weight: 800;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    min-height: 72px;
    padding: 0 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .jump-btn {
    min-width: 128px;
    font-size: clamp(22px, 5.2vw, 34px);
  }

  .play-btn {
    min-width: 192px;
    color: #0a1220;
    background: linear-gradient(90deg, var(--mint), var(--mint-2));
    border: 0;
  }

  .action-btn,
  .link-btn {
    width: 100%;
    font-size: clamp(18px, 4.3vw, 30px);
  }

  .tips {
    margin: 28px 26px 26px;
    padding: 24px 26px;
    border-radius: 28px;
    background: rgba(64, 81, 107, 0.6);
    color: rgba(255, 255, 255, 0.72);
    font-size: clamp(15px, 4.2vw, 26px);
    line-height: 1.6;
  }

  audio {
    display: none;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (max-width: 520px) {
    .phone-shell {
      min-height: calc(100vh - 24px);
      border-radius: 32px;
    }

    .content {
      padding: 18px 14px 10px;
    }

    .theme-badge {
      padding: 14px 20px;
      font-size: 16px;
    }

    .status-text {
      padding: 8px 0;
      font-size: 12px;
    }

    .record {
      width: min(100%, 330px);
    }

    .record-core {
      width: 122px;
      font-size: 52px;
    }

    .controls {
      gap: 12px;
    }

    .jump-btn {
      min-width: 98px;
    }

    .play-btn {
      min-width: 150px;
    }

    .secondary-actions {
      gap: 12px;
    }
  }
</style>
</head>
<body>
  <main class="phone-shell">
    <div class="content">
      <div class="topbar">
        <div class="theme-badge" id="themeBadge">空灵氛围</div>
        <div class="status-text" id="statusText">请点击后播放</div>
      </div>

      <section class="hero">
        <div class="record" id="record">
          <div class="record-core" id="recordIcon">♪</div>
        </div>
      </section>

      <section class="text-block">
        <h1 class="title" id="title">微信扫码收听</h1>
        <p class="subtitle" id="subtitle">打开即可播放，适合分享课程、朗读、播客或品牌语音内容。</p>
      </section>

      <section class="progress-wrap">
        <div class="time-row">
          <span id="currentTime">00:00</span>
          <span id="duration">00:00</span>
        </div>
        <input id="seekBar" class="seek-bar" type="range" min="0" max="100" value="0">
      </section>

      <section class="controls">
        <button id="rewindBtn" class="jump-btn" type="button">-10s</button>
        <button id="playBtn" class="play-btn jump-btn" type="button">播放</button>
        <button id="forwardBtn" class="jump-btn" type="button">+10s</button>
      </section>

      <section class="secondary-actions">
        <button id="speedBtn" class="action-btn" type="button">1.0x</button>
        <button id="shareBtn" class="action-btn" type="button">复制链接</button>
        <a id="downloadBtn" class="link-btn" href="#" download>下载音频</a>
      </section>

      <section class="tips">
        建议把这个页面通过 GitHub Pages 发布，再把二维码印在海报、名片或朋友圈配图中。微信内置浏览器可直接播放音频。
      </section>
    </div>

    <audio id="audio" preload="metadata" playsinline webkit-playsinline></audio>
  </main>

<script>
  const params = new URLSearchParams(window.location.search);
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const forwardBtn = document.getElementById('forwardBtn');
  const speedBtn = document.getElementById('speedBtn');
  const shareBtn = document.getElementById('shareBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const seekBar = document.getElementById('seekBar');
  const currentTime = document.getElementById('currentTime');
  const duration = document.getElementById('duration');
  const statusText = document.getElementById('statusText');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const themeBadge = document.getElementById('themeBadge');
  const record = document.getElementById('record');
  const recordIcon = document.getElementById('recordIcon');

  const themes = {
    aurora: {
      label: '空灵氛围',
      icon: '♪',
      vars: {
        bg1: '#0d2238', bg2: '#132b45', mint: '#85e1d6', mint2: '#eef7ef', gold: '#f0d786'
      }
    },
    podcast: {
      label: '播客对谈',
      icon: '🎙',
      vars: {
        bg1: '#24162f', bg2: '#3a2350', mint: '#f39bc5', mint2: '#fff0f6', gold: '#ffd38c'
      }
    },
    story: {
      label: '故事朗读',
      icon: '📚',
      vars: {
        bg1: '#10273f', bg2: '#163652', mint: '#8fd8d0', mint2: '#effaf6', gold: '#ecd38a'
      }
    },
    memo: {
      label: '语音备忘',
      icon: '✦',
      vars: {
        bg1: '#112a24', bg2: '#1d453b', mint: '#8de0bf', mint2: '#eefcf4', gold: '#f4e3ab'
      }
    },
    radio: {
      label: '电台时刻',
      icon: '◉',
      vars: {
        bg1: '#301b2d', bg2: '#492645', mint: '#ff9ca8', mint2: '#fff0f0', gold: '#f6d46f'
      }
    },
    luxe: {
      label: '金色奢感',
      icon: '♬',
      vars: {
        bg1: '#28190e', bg2: '#4b2d1b', mint: '#f1c779', mint2: '#fff5e4', gold: '#ffe6a4'
      }
    },
    forest: {
      label: '自然清听',
      icon: '♩',
      vars: {
        bg1: '#0e2519', bg2: '#173627', mint: '#9fe0bc', mint2: '#f3fff6', gold: '#dff3ad'
      }
    }
  };

  function applyTheme(themeKey) {
    const theme = themes[themeKey] || themes.aurora;
    document.documentElement.style.setProperty('--bg-1', theme.vars.bg1);
    document.documentElement.style.setProperty('--bg-2', theme.vars.bg2);
    document.documentElement.style.setProperty('--mint', theme.vars.mint);
    document.documentElement.style.setProperty('--mint-2', theme.vars.mint2);
    document.documentElement.style.setProperty('--gold', theme.vars.gold);
    themeBadge.textContent = theme.label;
    recordIcon.textContent = theme.icon;
  }

  function formatTime(value) {
    if (!Number.isFinite(value)) return '00:00';
    const minutes = Math.floor(value / 60).toString().padStart(2, '0');
    const seconds = Math.floor(value % 60).toString().padStart(2, '0');
    return minutes + ':' + seconds;
  }

  function updateProgress() {
    currentTime.textContent = formatTime(audio.currentTime);
    duration.textContent = formatTime(audio.duration);
    const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    seekBar.value = percent;
    seekBar.style.setProperty('--progress', percent + '%');
  }

  function setPlayingState(playing) {
    playBtn.textContent = playing ? '暂停' : '播放';
    statusText.textContent = playing ? '正在播放' : '请点击后播放';
    record.classList.toggle('playing', playing);
  }

  function copyLink() {
    navigator.clipboard.writeText(window.location.href)
      .then(() => {
        shareBtn.textContent = '已复制';
        setTimeout(() => {
          shareBtn.textContent = '复制链接';
        }, 1600);
      })
      .catch(() => {
        shareBtn.textContent = '复制失败';
        setTimeout(() => {
          shareBtn.textContent = '复制链接';
        }, 1600);
      });
  }

  const audioUrl = params.get('audio') || './audio.m4a';
  const titleText = params.get('title') || '微信扫码收听';
  const subtitleText = params.get('subtitle') || '打开即可播放，适合分享课程、朗读、播客或品牌语音内容。';
  const themeKey = params.get('theme') || 'aurora';

  applyTheme(themeKey);
  title.textContent = titleText;
  subtitle.textContent = subtitleText;
  audio.src = audioUrl;
  downloadBtn.href = audioUrl;
  updateProgress();

  playBtn.addEventListener('click', async () => {
    if (audio.paused) {
      try {
        await audio.play();
        setPlayingState(true);
      } catch (error) {
        statusText.textContent = '请点击后播放';
      }
    } else {
      audio.pause();
      setPlayingState(false);
    }
  });

  rewindBtn.addEventListener('click', () => {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });

  forwardBtn.addEventListener('click', () => {
    audio.currentTime = Math.min(audio.duration || audio.currentTime + 10, audio.currentTime + 10);
  });

  speedBtn.addEventListener('click', () => {
    const speeds = [1, 1.25, 1.5, 2, 0.75];
    const currentIndex = speeds.indexOf(audio.playbackRate);
    const nextSpeed = speeds[(currentIndex + 1) % speeds.length];
    audio.playbackRate = nextSpeed;
    speedBtn.textContent = nextSpeed.toFixed(2).replace(/\.00$/, '.0') + 'x';
  });

  shareBtn.addEventListener('click', copyLink);

  seekBar.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (Number(seekBar.value) / 100) * audio.duration;
  });

  audio.addEventListener('loadedmetadata', updateProgress);
  audio.addEventListener('timeupdate', updateProgress);
  audio.addEventListener('pause', () => setPlayingState(false));
  audio.addEventListener('play', () => setPlayingState(true));
  audio.addEventListener('ended', () => {
    setPlayingState(false);
    statusText.textContent = '播放完成';
  });
</script>
</body>
</html>
