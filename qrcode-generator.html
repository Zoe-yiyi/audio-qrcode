<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信音频二维码生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --paper: #f8f4ec;
    --ink: #1f1d2b;
    --muted: #665f73;
    --panel: rgba(255,255,255,0.72);
    --line: rgba(31,29,43,0.1);
    --accent: #0ea5a0;
    --accent-2: #f59e0b;
    --poster-chip-bg: rgba(255,255,255,0.18);
    --poster-chip-text: rgba(255,255,255,0.96);
    --poster-panel-bg: rgba(255,255,255,0.10);
    --poster-panel-line: rgba(255,255,255,0.16);
    --poster-glow-1: rgba(255,255,255,0.25);
    --poster-glow-2: rgba(255,255,255,0.16);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 28%),
      linear-gradient(135deg, #efe6d7, #dce7ef 45%, #e9f2e3);
    padding: 28px;
  }

  .layout {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(320px, 430px) 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel,
  .preview-card {
    border-radius: 28px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    box-shadow: 0 24px 60px rgba(31, 29, 43, 0.14);
  }

  .panel {
    padding: 24px;
    position: sticky;
    top: 20px;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 32px;
  }

  .lead {
    margin: 0 0 20px;
    color: var(--muted);
    line-height: 1.7;
    font-size: 15px;
  }

  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
  }

  input,
  select,
  textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(31,29,43,0.12);
    background: rgba(255,255,255,0.85);
    padding: 12px 14px;
    font: inherit;
    color: var(--ink);
  }

  textarea { min-height: 88px; resize: vertical; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .hint {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 18px;
  }

  .status-note {
    margin-top: 12px;
    min-height: 24px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .status-note.error {
    color: #b42318;
  }

  .status-note.success {
    color: #0f766e;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 13px 18px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .primary {
    color: white;
    background: linear-gradient(135deg, var(--accent), #0f766e);
  }

  .secondary {
    color: var(--ink);
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(31,29,43,0.12);
  }

  .preview-wrap {
    display: grid;
    gap: 18px;
  }

  .preview-card {
    padding: 30px;
    overflow: hidden;
    position: relative;
    min-height: 720px;
  }

  .poster {
    width: min(100%, 620px);
    margin: 0 auto;
    padding: 30px;
    border-radius: 36px;
    color: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 28px 60px rgba(15, 23, 42, 0.22);
  }

  .poster::before,
  .poster::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    opacity: 0.42;
  }

  .poster::before {
    width: 260px;
    height: 260px;
    right: -80px;
    top: -60px;
    background: var(--poster-glow-1);
  }

  .poster::after {
    width: 220px;
    height: 220px;
    left: -70px;
    bottom: -60px;
    background: var(--poster-glow-2);
  }

  .poster-head,
  .poster-body,
  .poster-foot {
    position: relative;
    z-index: 1;
  }

  .poster-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    background: var(--poster-chip-bg);
    color: var(--poster-chip-text);
    backdrop-filter: blur(8px);
    font-size: 14px;
  }

  .poster h2 {
    margin: 0;
    font-size: 38px;
    line-height: 1.15;
  }

  .poster p {
    margin: 12px 0 0;
    line-height: 1.75;
    color: rgba(255,255,255,0.82);
  }

  .poster-subtitle-line + .poster-subtitle-line {
    margin-top: 8px;
  }

  .poster-body {
    display: grid;
    grid-template-columns: 1fr 270px;
    gap: 24px;
    align-items: center;
    margin: 34px 0 26px;
  }

  .wave {
    min-height: 220px;
    border-radius: 26px;
    background: var(--poster-panel-bg);
    border: 1px solid var(--poster-panel-line);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 10px;
    padding: 28px;
  }

  .bar {
    width: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.85);
  }

  .qrcode-box {
    background: white;
    border-radius: 28px;
    padding: 20px;
    display: grid;
    place-items: center;
    box-shadow: inset 0 0 0 1px rgba(15,23,42,0.08);
  }

  #qrcode {
    width: 230px;
    height: 230px;
  }

  #qrcode img,
  #qrcode canvas {
    width: 100% !important;
    height: 100% !important;
  }

  .poster-foot {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .foot-note {
    max-width: 320px;
    font-size: 14px;
    color: rgba(255,255,255,0.84);
    line-height: 1.7;
  }

  .urls {
    padding: 16px 18px;
    border-radius: 22px;
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(31,29,43,0.08);
    color: var(--ink);
    font-size: 13px;
    line-height: 1.7;
    word-break: break-all;
  }

  .urls strong { display: inline-block; margin-right: 6px; }

  @media (max-width: 980px) {
    .layout { grid-template-columns: 1fr; }
    .panel { position: static; }
    .poster-body { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    body { padding: 16px; }
    .panel, .preview-card { border-radius: 24px; }
    .preview-card, .panel { padding: 18px; }
    .two-col { grid-template-columns: 1fr; }
    .poster { padding: 22px; border-radius: 28px; }
    .poster h2 { font-size: 30px; }
    #qrcode { width: 210px; height: 210px; }
  }
</style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <h1>音频二维码生成器</h1>
      <p class="lead">把音频托管到 GitHub，再通过 GitHub Pages 播放页生成长期有效、可反复扫码的微信收听二维码。</p>

      <div class="field two-col">
        <div>
          <label for="username">GitHub 用户名</label>
          <input id="username" value="Zoe-yiyi" placeholder="例如 yourname">
        </div>
        <div>
          <label for="repo">仓库名</label>
          <input id="repo" value="audio-qrcode" placeholder="例如 audio-qrcode">
        </div>
      </div>

      <div class="field two-col">
        <div>
          <label for="branch">分支名</label>
          <input id="branch" value="main" placeholder="main">
        </div>
        <div>
          <label for="fileName">音频文件名</label>
          <input id="fileName" value="audio.m4a" placeholder="audio.m4a">
        </div>
      </div>

      <div class="field">
        <label for="directAudioUrl">或直接粘贴音频直链</label>
          <input id="directAudioUrl" placeholder="https://用户名.github.io/audio-qrcode/audio.m4a">
          <div class="hint">留空时会根据 GitHub 用户名、仓库名和音频文件名自动拼接 GitHub Pages 同域音频链接，移动端兼容性更稳定。</div>
      </div>

      <div class="field">
        <label for="title">主标题</label>
          <input id="title" value="班级小故事" placeholder="例如 春日治愈钢琴集">
      </div>

      <div class="field">
        <label for="posterSubtitleInput">海报副标题</label>
        <textarea id="posterSubtitleInput" placeholder="例如 扫码即可收听班级小故事，适合班级分享、活动留念与成长记录。">扫码即可收听班级小故事，适合班级分享、活动留念与成长记录，页面长期有效，可反复扫码。</textarea>
      </div>

      <div class="field">
        <label for="playerSubtitleInput">播放页副标题</label>
        <textarea id="playerSubtitleInput" placeholder="例如 欢迎来到班级小故事，打开即可收听班级里的温暖片段与成长声音。">欢迎来到班级小故事，打开即可收听班级里的温暖片段与成长声音。</textarea>
      </div>

      <div class="field two-col">
        <div>
          <label for="theme">海报主题</label>
          <select id="theme">
            <option value="aurora">空灵氛围</option>
            <option value="podcast">播客对谈</option>
            <option value="story" selected>故事朗读</option>
            <option value="memo">语音备忘</option>
            <option value="radio">电台时刻</option>
            <option value="luxe">金色奢感</option>
            <option value="forest">自然清听</option>
          </select>
        </div>
        <div>
          <label for="badge">角标文字</label>
           <input id="badge" value="班级故事" placeholder="例如 新歌首发">
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="generateBtn" type="button">生成二维码</button>
        <button class="secondary" id="downloadBtn" type="button">下载二维码海报</button>
      </div>
      <div class="status-note" id="statusNote"></div>
    </section>

    <section class="preview-wrap">
      <div class="preview-card">
        <div class="poster" id="poster">
          <div class="poster-head">
            <span class="chip" id="badgeText">班级故事</span>
            <span class="chip" id="themeText">故事朗读</span>
          </div>

          <div class="poster-copy">
            <h2 id="posterTitle">班级小故事</h2>
            <p id="posterSubtitle">扫码即可收听班级小故事，适合班级分享、活动留念与成长记录，页面长期有效，可反复扫码。</p>
          </div>

          <div class="poster-body">
            <div class="wave" id="wave"></div>
            <div class="qrcode-box">
              <div id="qrcode"></div>
            </div>
          </div>

          <div class="poster-foot">
            <div class="foot-note">扫码进入专属班级故事收听页，支持微信内打开、长期分享、不限扫码次数。</div>
            <div class="chip" id="scanHint">扫码收听</div>
          </div>
        </div>
      </div>

      <div class="urls" id="urlBox">
        <div><strong>音频链接:</strong><span id="audioUrlText">等待生成</span></div>
        <div><strong>播放页面:</strong><span id="pageUrlText">等待生成</span></div>
      </div>
    </section>
  </div>

<script>
  const username = document.getElementById('username');
  const repo = document.getElementById('repo');
  const branch = document.getElementById('branch');
  const fileName = document.getElementById('fileName');
  const directAudioUrl = document.getElementById('directAudioUrl');
  const titleInput = document.getElementById('title');
  const posterSubtitleInput = document.getElementById('posterSubtitleInput');
  const playerSubtitleInput = document.getElementById('playerSubtitleInput');
  const themeSelect = document.getElementById('theme');
  const badgeInput = document.getElementById('badge');
  const badgeText = document.getElementById('badgeText');
  const themeText = document.getElementById('themeText');
  const poster = document.getElementById('poster');
  const posterTitle = document.getElementById('posterTitle');
  const posterSubtitle = document.getElementById('posterSubtitle');
  const wave = document.getElementById('wave');
  const urlBox = document.getElementById('urlBox');
  const audioUrlText = document.getElementById('audioUrlText');
  const pageUrlText = document.getElementById('pageUrlText');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const qrcodeNode = document.getElementById('qrcode');
  const statusNote = document.getElementById('statusNote');

  const themeMap = {
    aurora: {
      name: '空灵氛围',
      bg1: '#173d89',
      bg2: '#245fb8',
      accent: '#63cde8',
      accentSoft: '#edf8fd',
      gold: '#eacb73'
    },
    podcast: {
      name: '播客对谈',
      bg1: '#91315f',
      bg2: '#c45b58',
      accent: '#f0a8b8',
      accentSoft: '#fff3f7',
      gold: '#e7c37a'
    },
    story: {
      name: '故事朗读',
      bg1: '#a14e38',
      bg2: '#d28a42',
      accent: '#f0c487',
      accentSoft: '#fff8ef',
      gold: '#efd789'
    },
    memo: {
      name: '语音备忘',
      bg1: '#1d7f63',
      bg2: '#3fa187',
      accent: '#8ed8bf',
      accentSoft: '#f0fbf6',
      gold: '#e8d08e'
    },
    radio: {
      name: '电台时刻',
      bg1: '#56339a',
      bg2: '#8f4ca8',
      accent: '#e2a8d8',
      accentSoft: '#faf2fc',
      gold: '#e8c56e'
    },
    luxe: {
      name: '金色奢感',
      bg1: '#9a5a1f',
      bg2: '#c99643',
      accent: '#efcf90',
      accentSoft: '#fff8ed',
      gold: '#f0dc95'
    },
    forest: {
      name: '自然清听',
      bg1: '#236f46',
      bg2: '#5a9a49',
      accent: '#b8de98',
      accentSoft: '#f6fcef',
      gold: '#dfd27d'
    }
  };

  function renderWave() {
    wave.innerHTML = '';
    [54, 88, 66, 120, 80, 104, 58, 96, 72, 112].forEach(height => {
      const bar = document.createElement('span');
      bar.className = 'bar';
      bar.style.height = height + 'px';
      wave.appendChild(bar);
    });
  }

  function encodePathSegments(path) {
    return path.split('/').map(segment => encodeURIComponent(segment)).join('/');
  }

  function buildPagesBaseUrl() {
    return 'https://' + username.value.trim() + '.github.io/' + repo.value.trim() + '/';
  }

  function buildAutoAudioUrl() {
    return buildPagesBaseUrl() + encodePathSegments(fileName.value.trim());
  }

  function buildAudioUrl() {
    if (directAudioUrl.value.trim()) return directAudioUrl.value.trim();
    return buildAutoAudioUrl();
  }

  function buildPageUrl(audioUrl) {
    const params = new URLSearchParams({
      audio: audioUrl,
      title: titleInput.value.trim(),
      subtitle: playerSubtitleInput.value.trim(),
      theme: themeSelect.value
    });
    return buildPagesBaseUrl() + '?' + params.toString();
  }

  function hexToRgb(hex) {
    const normalized = hex.replace('#', '');
    const value = normalized.length === 3
      ? normalized.split('').map(char => char + char).join('')
      : normalized;
    const number = parseInt(value, 16);

    return {
      r: (number >> 16) & 255,
      g: (number >> 8) & 255,
      b: number & 255
    };
  }

  function withAlpha(hex, alpha) {
    const rgb = hexToRgb(hex);
    return 'rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', ' + alpha + ')';
  }

  function setStatus(message, type) {
    statusNote.textContent = message || '';
    statusNote.className = 'status-note' + (type ? ' ' + type : '');
  }

  function setBusyState(isBusy) {
    generateBtn.disabled = isBusy;
    downloadBtn.disabled = isBusy;
    generateBtn.style.opacity = isBusy ? '0.7' : '1';
    downloadBtn.style.opacity = isBusy ? '0.7' : '1';
    generateBtn.style.cursor = isBusy ? 'wait' : 'pointer';
    downloadBtn.style.cursor = isBusy ? 'wait' : 'pointer';
  }

  function ensureLibraries() {
    if (!window.QRCode) {
      throw new Error('二维码脚本加载失败，请刷新页面后重试。');
    }

    if (!window.html2canvas) {
      throw new Error('海报导出脚本加载失败，请刷新页面后重试。');
    }
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function splitSubtitleSegments(text) {
    return text
      .replace(/\r\n?/g, '\n')
      .split('\n')
      .flatMap(line => line.split(/\s*-\s*/))
      .map(item => item.trim())
      .filter(Boolean);
  }

  function renderPosterSubtitle(text) {
    const lines = splitSubtitleSegments(text.trim());
    const hasListMarkers = lines.length > 1;

    if (!lines.length) {
      posterSubtitle.textContent = '';
      return;
    }

    posterSubtitle.innerHTML = lines
      .map(item => '<div class="poster-subtitle-line">' + (hasListMarkers ? '- ' : '') + escapeHtml(item) + '</div>')
      .join('');
  }

  function applyTheme() {
    const theme = themeMap[themeSelect.value];
    poster.style.background = [
      'radial-gradient(circle at 18% 18%, ' + withAlpha(theme.accentSoft, 0.18) + ', transparent 28%)',
      'radial-gradient(circle at 85% 14%, ' + withAlpha(theme.gold, 0.18) + ', transparent 24%)',
      'radial-gradient(circle at 20% 88%, ' + withAlpha(theme.accent, 0.20) + ', transparent 26%)',
      'linear-gradient(145deg, ' + theme.bg1 + ', ' + theme.bg2 + ' 58%, ' + theme.accent + ')'
    ].join(', ');
    poster.style.setProperty('--poster-chip-bg', withAlpha(theme.accentSoft, 0.14));
    poster.style.setProperty('--poster-chip-text', theme.accentSoft);
    poster.style.setProperty('--poster-panel-bg', withAlpha(theme.accent, 0.12));
    poster.style.setProperty('--poster-panel-line', withAlpha(theme.accentSoft, 0.18));
    poster.style.setProperty('--poster-glow-1', withAlpha(theme.gold, 0.28));
    poster.style.setProperty('--poster-glow-2', withAlpha(theme.accent, 0.18));
    themeText.textContent = theme.name;
    badgeText.textContent = badgeInput.value.trim() || '微信扫码收听';
    posterTitle.textContent = titleInput.value.trim() || '扫码收听我的音频';
    renderPosterSubtitle(posterSubtitleInput.value.trim() || '微信扫码即播，页面长期有效。');
  }

  let qr;

  function generate() {
    try {
      ensureLibraries();
      applyTheme();
      renderWave();

      const audioUrl = buildAudioUrl();
      const pageUrl = buildPageUrl(audioUrl);

      audioUrlText.textContent = audioUrl;
      pageUrlText.textContent = pageUrl;
      qrcodeNode.innerHTML = '';

      qr = new QRCode(qrcodeNode, {
        text: pageUrl,
        width: 230,
        height: 230,
        colorDark: '#111827',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      setStatus('二维码已更新，可直接下载海报。', 'success');
      return true;
    } catch (error) {
      setStatus(error.message || '生成二维码失败，请稍后重试。', 'error');
      return false;
    }
  }

  function nextFrame() {
    return new Promise(resolve => requestAnimationFrame(() => resolve()));
  }

  async function downloadPoster() {
    try {
      setBusyState(true);

      if (!generate()) {
        return;
      }

      await nextFrame();
      await nextFrame();

      const canvas = await html2canvas(poster, {
        backgroundColor: null,
        scale: Math.max(2, Math.min(3, window.devicePixelRatio || 2)),
        useCORS: true,
        logging: false
      });

      const link = document.createElement('a');
      link.download = 'wechat-audio-qrcode.png';
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setStatus('二维码海报已开始下载。', 'success');
    } catch (error) {
      setStatus(error.message || '下载二维码海报失败，请稍后重试。', 'error');
    } finally {
      setBusyState(false);
    }
  }

  function applyQueryDefaults() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('username')) username.value = params.get('username');
    if (params.get('repo')) repo.value = params.get('repo');
    if (params.get('branch')) branch.value = params.get('branch');
    if (params.get('file')) fileName.value = params.get('file');
    if (params.get('audio')) directAudioUrl.value = params.get('audio');
    if (params.get('title')) titleInput.value = params.get('title');
    if (params.get('subtitle')) {
      playerSubtitleInput.value = params.get('subtitle');
      if (!params.get('posterSubtitle')) {
        posterSubtitleInput.value = params.get('subtitle');
      }
    }
    if (params.get('posterSubtitle')) posterSubtitleInput.value = params.get('posterSubtitle');
    if (params.get('theme') && themeMap[params.get('theme')]) themeSelect.value = params.get('theme');
    if (params.get('badge')) badgeInput.value = params.get('badge');
  }

  [username, repo, branch, fileName, directAudioUrl, titleInput, posterSubtitleInput, playerSubtitleInput, themeSelect, badgeInput].forEach(node => {
    node.addEventListener('input', generate);
    node.addEventListener('change', generate);
  });

  generateBtn.addEventListener('click', generate);
  downloadBtn.addEventListener('click', downloadPoster);
  applyQueryDefaults();
  renderWave();
  generate();
</script>
</body>
</html>
